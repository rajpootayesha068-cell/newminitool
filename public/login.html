<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mini Tool Box</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="css/newstyle.css" as="style">
    <link rel="preload" href="css/signup-login.css" as="style">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <link rel="stylesheet" href="css/newstyle.css">
    <link rel="stylesheet" href="css/signup-login.css">

    <script>
        window.CONFIG = {
            API_URL: "https://minitoolbackend-production.up.railway.app/"
        };
    </script>
</head>
<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Background -->
    <div class="background-wrapper">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="main-wrapper">
        <section class="auth-section">
            <div class="auth-container">
                <!-- Hero -->
                <div class="auth-hero">
                    <h1 class="auth-hero-title">
                        Welcome <span class="title-gradient">Back</span>
                    </h1>
                    <p class="auth-hero-subtitle">
                        Your smart writing assistant. Elevate your text with AI-driven precision.
                    </p>
                    
                    <div class="auth-features">
                        <div class="auth-feature"><i class="fas fa-check-circle"></i><span>10+ AI Writing Tools</span></div>
                        <div class="auth-feature"><i class="fas fa-check-circle"></i><span>Free Forever</span></div>
                        <div class="auth-feature"><i class="fas fa-check-circle"></i><span>No Credit Card Required</span></div>
                    </div>
                </div>

                <!-- Login Card -->
                <div class="auth-card">
                    <div class="auth-card-header">
                        <h2>Welcome Back</h2>
                        <p>Login to access your workspace</p>
                    </div>
                    
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <div class="password-header">
                                <label for="password"><i class="fas fa-lock"></i> Password</label>
                                <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
                            </div>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                                <button type="button" class="password-toggle" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div id="loginError" class="error-message" style="display:none;"></div>
                        <div id="loginSuccess" class="success-message" style="display:none;"></div>

                        <button type="submit" class="auth-btn" id="loginBtn">
                            <span class="btn-text">Login</span>
                            <i class="fas fa-arrow-right"></i>
                            <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                        </button>
                    </form>

                    <div class="social-divider"><span>or continue with</span></div>
                    
                    <button class="social-btn google-btn" id="googleLoginBtn">
                        <i class="fab fa-google"></i> Google
                    </button>

                    <p class="auth-footer">
                        New here? <a href="signup.html">Create an account</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts - Deferred where possible -->
    <script src="js/layout.js" defer></script>
    <script src="js/main.js" defer></script>
    <script type="module" src="js/script.js" defer></script>
    <script type="module" src="js/auth.js" defer></script>
</body>
</html>
